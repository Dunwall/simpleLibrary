<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Library Assignment for The Odin Project</title>
    <script src="library.js"></script>
    <link rel="stylesheet" href="library.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><u>MY LIBRARY</u></h1>
        </header>
        <div class="title">
            <h2>Books</h2>
        </div>
        <section class="actualInfo" id="cardContainer">
            
        </section>
        <div class="buttonContainer">
            <dialog id="my-dialog">
                <p>Enter book attributes: </p>
                <form action="submit" class="form" id="inputForm">
                    
                    <label for="title">Title: </label><br>
                    <input type="text" id="title" name="title" required><br>
                    
                    <label for="author" id="author">Author: </label><br>
                    <input type="text" id="author" name="author" required><br>

                    <label for="pages" id="pages">Pages: </label><br>
                    <input type="number" id="pages" name="pages" min="1" required><br>

                    <label for="readStatus" id="readStatus">Read Yet: </label><br>
                    <input type="text" id="readStatus" name="readStatus" required><br>
                </form> 
                <button form="inputForm" id="submitButton">Add</button>
                <!-- <button type="submit" commandfor="my-dialog" command="close" class="close">Close</button> -->
                <button commandfor="my-dialog" command="close" class="close">Close</button>
            </dialog>
            <button command="show-modal" commandfor="my-dialog" id="addButton" id="addBook">
                <h4>Add Book</h4>
            </button>
        </div>
    </div>
</body>
</html>
